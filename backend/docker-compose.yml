services:

  db:
    image: postgres:15
    container_name: meal_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meal_optimization

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: .
    container_name: meal_backend

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/meal_optimization

    ports:
      - "8000:8000"

    volumes:
      - .:/app


  pgadmin:
    image: dpage/pgadmin4
    container_name: meal_pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@meal.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - db

    volumes:
      - pgadmin_data:/var/lib/pgadmin


volumes:
  postgres_data:
  pgadmin_data: